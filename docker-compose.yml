services:
  movies-made-easy:
    build: .
    image: movies-made-easy
    container_name: movies-made-easy
    restart: unless-stopped
    ports:
      # Host port is configurable (default 3000). Override with HOST_PORT in a
      # local .env when 3000 is taken — e.g. HOST_PORT=3001.
      - "${HOST_PORT:-3000}:3000"
    environment:
      - PORT=3000
      - CACHE_TTL_MS=60000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional public exposure via Cloudflare Tunnel — no open ports, hidden home
  # IP, automatic SSL. Enable with:  docker compose --profile tunnel up -d
  # Set TUNNEL_TOKEN in .env (from the Cloudflare Zero Trust dashboard). On the
  # tunnel's Public Hostname, point the service at: http://movies-made-easy:3000
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: movies-cloudflared
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - movies-made-easy
